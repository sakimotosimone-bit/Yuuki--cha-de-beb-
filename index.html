<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Presentes - Yuuki</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #c8dff0;
    --sky-light: #e8f3fb;
    --sky-deep: #a0c4de;
    --navy: #2d5f8a;
    --navy-light: #4a7fa8;
    --white: #ffffff;
    --gray: #6b8ea8;
    --gray-light: #e2eef6;
    --green: #4caf7d;
    --red: #e05c5c;
    --red-light: #fdeaea;
    --shadow: 0 4px 20px rgba(45,95,138,0.10);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #daedf8 0%, #c8dff0 50%, #b8d5ea 100%);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  .header { text-align: center; padding: 40px 20px 24px; }
  .header h1 { font-family: 'Pacifico', cursive; font-size: 2.4rem; color: var(--navy); line-height: 1.2; text-shadow: 0 2px 8px rgba(45,95,138,0.12); }
  .header p { color: var(--navy-light); font-size: 1rem; margin-top: 10px; font-weight: 500; }
  .planes { font-size: 1.5rem; margin-top: 10px; letter-spacing: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; }
  .btn-outline { background: rgba(255,255,255,0.7); color: var(--navy); border: 2px solid var(--navy-light); backdrop-filter: blur(6px); }
  .btn-outline:hover { background: white; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #3d9d6a; }
  .btn-danger { background: var(--red); color: white; font-size: 0.85rem; padding: 7px 14px; }
  .top-bar { display: flex; justify-content: center; gap: 12px; padding: 0 20px 20px; flex-wrap: wrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 16px; max-width: 1000px; margin: 0 auto; }
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s; }
  .card:hover { transform: translateY(-2px); }
  .card-img { width: 100%; height: 180px; object-fit: cover; background: var(--gray-light); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--gray); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder { width: 100%; height: 180px; background: var(--gray-light); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title { font-family: 'Pacifico', cursive; font-size: 1.05rem; color: var(--navy); line-height: 1.3; }
  .card-desc { color: var(--gray); font-size: 0.88rem; font-weight: 500; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .badge { background: var(--sky-light); color: var(--navy-light); border: 1.5px solid var(--sky-deep); border-radius: 50px; padding: 4px 13px; font-size: 0.82rem; font-weight: 700; }
  .badge.full { background: var(--red-light); color: var(--red); border-color: #f5b5b5; }
  .badge.partial { background: #fff8e8; color: #b07a00; border-color: #f0d890; }
  .card-actions { display: flex; gap: 6px; align-items: center; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px 6px; border-radius: 8px; transition: background 0.15s; }
  .icon-btn:hover { background: var(--gray-light); }
  .reservations { margin-top: 8px; border-top: 1.5px dashed var(--sky-deep); padding-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .reservation-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; background: var(--sky-light); border-radius: 8px; padding: 4px 10px; }
  .reservation-item span { color: var(--navy); font-weight: 600; }
  .reservation-item small { color: var(--gray); }
  .empty { text-align: center; padding: 60px 20px; background: white; border-radius: var(--radius); box-shadow: var(--shadow); max-width: 400px; margin: 0 auto; }
  .empty .emoji { font-size: 3.5rem; }
  .empty h3 { font-family: 'Pacifico', cursive; color: var(--navy); margin: 14px 0 8px; font-size: 1.2rem; }
  .empty p { color: var(--gray); font-size: 0.9rem; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(45,95,138,0.35); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: white; border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(45,95,138,0.22); position: relative; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: 'Pacifico', cursive; color: var(--navy); margin-bottom: 18px; font-size: 1.2rem; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--gray); }
  .form-group { margin-bottom: 14px; display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--navy); }
  .form-group input, .form-group textarea, .form-group select { border: 2px solid var(--sky-deep); border-radius: 10px; padding: 9px 12px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; outline: none; transition: border 0.15s; color: var(--navy); }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--navy); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .img-preview { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; margin-top: 6px; display: none; }
  .footer { text-align: center; padding: 30px 20px 0; color: var(--navy-light); font-size: 0.85rem; font-weight: 600; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; z-index: 200; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .loading { text-align: center; padding: 40px; color: var(--navy-light); font-size: 1rem; font-weight: 600; }
  @media (max-width: 480px) { .header h1 { font-size: 1.9rem; } .grid { grid-template-columns: 1fr; padding: 0 12px; } }
</style>
</head>
<body>

<div class="header">
  <h1>Lista de Presentes<br>Yuuki</h1>
  <p>Nosso maior presente será sua presença. A lista abaixo é apenas uma sugestão. 💙</p>
  <div class="planes">☁️✈️☁️✈️☁️</div>
</div>

<div class="top-bar" id="topBar">
  <button class="btn btn-outline" onclick="openAdminModal()">🔒 Área Admin</button>
</div>

<div class="grid" id="grid"><div class="loading">☁️ Carregando lista...</div></div>

<div class="footer">✈️ Yuuki está chegando! ☁️</div>

<!-- ADMIN LOGIN -->
<div class="overlay" id="adminLoginOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('adminLoginOverlay')">✕</button>
    <h2>🔒 Área Admin</h2>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="adminPass" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')checkAdmin()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="checkAdmin()">Entrar</button>
    <p id="adminError" style="color:var(--red);font-size:0.85rem;margin-top:10px;display:none">Senha incorreta.</p>
  </div>
</div>

<!-- ADD/EDIT GIFT -->
<div class="overlay" id="giftModal">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('giftModal')">✕</button>
    <h2 id="giftModalTitle">Adicionar Presente</h2>
    <div class="form-group">
      <label>Nome do presente</label>
      <input type="text" id="giftName" placeholder="Ex: Fraldas e lencinho">
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="giftDesc" placeholder="Ex: Moony, tipo calcinha, tamanho M"></textarea>
    </div>
    <div class="form-group">
      <label>Quantidade disponível</label>
      <input type="number" id="giftQty" min="1" value="1">
    </div>
    <div class="form-group">
      <label>Imagem (foto do celular)</label>
      <input type="file" id="giftImgFile" accept="image/*" onchange="previewImgFile()" style="border:2px solid var(--sky-deep);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:0.9rem;width:100%">
      <img id="imgPreview" class="img-preview" alt="preview">
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" style="flex:1" onclick="saveGift()">Salvar</button>
      <button class="btn btn-outline" style="flex:1" onclick="closeOverlay('giftModal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- RESERVE -->
<div class="overlay" id="reserveModal">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('reserveModal')">✕</button>
    <h2>🎁 Reservar presente</h2>
    <p style="color:var(--gray);font-size:0.9rem;margin-bottom:16px" id="reserveGiftName"></p>
    <div class="form-group">
      <label>Seu nome</label>
      <input type="text" id="reserveName" placeholder="Como quer ser identificado?">
    </div>
    <div class="form-group">
      <label>Quantidade</label>
      <input type="number" id="reserveQty" min="1" value="1">
    </div>
    <button class="btn btn-green" style="width:100%" onclick="confirmReserve()">✅ Confirmar reserva</button>
  </div>
</div>

<!-- CANCEL RESERVE -->
<div class="overlay" id="cancelModal">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('cancelModal')">✕</button>
    <h2>❌ Cancelar reserva</h2>
    <p style="color:var(--gray);font-size:0.9rem;margin-bottom:16px">Digite seu nome para cancelar:</p>
    <div class="form-group">
      <input type="text" id="cancelName" placeholder="Seu nome">
    </div>
    <button class="btn btn-danger" style="width:100%" onclick="confirmCancel()">Cancelar minha reserva</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJzJR0nucT4KQDiriyOTSx5StqnLTNZ4I",
    authDomain: "lista-yuuki.firebaseapp.com",
    projectId: "lista-yuuki",
    storageBucket: "lista-yuuki.firebasestorage.app",
    messagingSenderId: "752822048844",
    appId: "1:752822048844:web:332759d494f74a6033bce9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const giftsCol = collection(db, "gifts");

  const ADMIN_PASS = 'yuuki2025';
  let gifts = [];
  let isAdmin = false;
  let editingId = null;
  let reservingId = null;
  let cancelingId = null;

  // Default gifts to seed on first load
  const defaultGifts = [
    { name: 'Fraldas e lencinho umedecido', desc: 'Moony, tipo fita, tamanho recém-nascido ou SS', qty: 10, img: '', reservations: [] },
    { name: 'Fraldas e lencinho umedecido', desc: 'Moony, tipo calcinha ou fita, tamanho S', qty: 10, img: '', reservations: [] },
    { name: 'Fraldas e lencinho umedecido', desc: 'Moony, tipo calcinha, tamanho M', qty: 20, img: '', reservations: [] },
    { name: 'Fraldas e lencinho umedecido', desc: 'Moony, tipo calcinha, tamanho L', qty: 20, img: '', reservations: [] },
    { name: 'Cobertor', desc: 'Imagem meramente ilustrativa', qty: 4, img: '', reservations: [] },
    { name: 'Toalha de banho', desc: 'Imagem meramente ilustrativa', qty: 4, img: '', reservations: [] },
    { name: 'Tesoura', desc: 'Buba ou Pigeon', qty: 2, img: '', reservations: [] },
    { name: 'Shampoo', desc: 'Johnson ou Pigeon', qty: 5, img: '', reservations: [] },
    { name: 'Loção hidratante', desc: 'Pigeon ou Kewpie Baby', qty: 5, img: '', reservations: [] },
    { name: 'Sabonete líquido', desc: 'Johnson, Kewpie ou Pigeon', qty: 5, img: '', reservations: [] },
    { name: 'Mamadeira grande ~260ml', desc: 'Pigeon ou NUK', qty: 1, img: '', reservations: [] },
    { name: 'Mamadeira média ~160ml', desc: 'Pigeon ou NUK', qty: 2, img: '', reservations: [] },
  ];

  // Listen to Firestore in real time
  onSnapshot(giftsCol, async (snapshot) => {
    if (snapshot.empty) {
      // Seed default gifts
      for (const g of defaultGifts) {
        await addDoc(giftsCol, { ...g, order: defaultGifts.indexOf(g) });
      }
      return;
    }
    gifts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    gifts.sort((a, b) => (a.order || 0) - (b.order || 0));
    render();
  });

  function reserved(g) { return (g.reservations || []).reduce((s, r) => s + r.qty, 0); }
  function available(g) { return g.qty - reserved(g); }

  function render() {
    const grid = document.getElementById('grid');
    if (gifts.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="emoji">🐻</div><h3>Nenhum presente ainda!</h3><p>Clique em "Adicionar Presente" para começar a lista do Yuuki 💙</p></div>`;
      return;
    }
    grid.innerHTML = gifts.map(g => {
      const res = reserved(g);
      const avail = available(g);
      const full = avail <= 0;
      const partial = res > 0 && !full;
      const badgeText = full ? '☁️ Esgotado' : `☁️ ${avail} disponíve${avail === 1 ? 'l' : 'is'}`;
      const badgeClass = full ? 'badge full' : (partial ? 'badge partial' : 'badge');
      const imgEl = g.img
        ? `<div class="card-img"><img src="${g.img}" alt="${g.name}" onerror="this.parentElement.innerHTML='🎁'"></div>`
        : `<div class="card-img-placeholder">🎁</div>`;
      const reserveBtn = !full
        ? `<button class="btn btn-primary" style="font-size:0.85rem;padding:8px 16px" onclick="window._reserve('${g.id}')">Reservar</button>`
        : `<button class="btn" style="background:var(--gray-light);color:var(--gray);font-size:0.85rem;padding:8px 16px" disabled>Esgotado</button>`;
      const cancelBtn = res > 0 ? `<button class="icon-btn" title="Cancelar minha reserva" onclick="window._cancel('${g.id}')">↩️</button>` : '';
      const adminActions = isAdmin
        ? `<button class="icon-btn" title="Editar" onclick="window._edit('${g.id}')">✏️</button>
           <button class="icon-btn" title="Excluir" onclick="window._delete('${g.id}')">✕</button>` : '';
      const reservationsList = isAdmin && (g.reservations || []).length > 0
        ? `<div class="reservations">
            <div style="font-size:0.75rem;font-weight:700;color:var(--navy-light);margin-bottom:2px">Reservas:</div>
            ${(g.reservations || []).map((r, i) => `
              <div class="reservation-item">
                <span>${r.name}</span>
                <small>${r.qty} unid.</small>
                <button class="icon-btn" style="font-size:0.8rem" onclick="window._removeRes('${g.id}',${i})">✕</button>
              </div>`).join('')}
          </div>` : '';
      return `<div class="card">${imgEl}<div class="card-body"><div class="card-title">${g.name}</div><div class="card-desc">${g.desc}</div><div class="card-footer"><span class="${badgeClass}">${badgeText}</span><div class="card-actions">${reserveBtn}${cancelBtn}${adminActions}</div></div>${reservationsList}</div></div>`;
    }).join('');
  }

  function renderTopBar() {
    const bar = document.getElementById('topBar');
    if (isAdmin) {
      bar.innerHTML = `<button class="btn btn-green" onclick="window._openAdd()">➕ Adicionar Presente</button><button class="btn btn-outline" onclick="window._logout()">🔓 Sair do Admin</button>`;
    } else {
      bar.innerHTML = `<button class="btn btn-outline" onclick="openAdminModal()">🔒 Área Admin</button>`;
    }
  }

  window.openAdminModal = () => {
    document.getElementById('adminPass').value = '';
    document.getElementById('adminError').style.display = 'none';
    showOverlay('adminLoginOverlay');
    setTimeout(() => document.getElementById('adminPass').focus(), 100);
  };
  window.checkAdmin = () => {
    if (document.getElementById('adminPass').value === ADMIN_PASS) {
      isAdmin = true; closeOverlay('adminLoginOverlay'); renderTopBar(); render(); toast('Bem-vinda, Admin! 🔓');
    } else { document.getElementById('adminError').style.display = 'block'; }
  };
  window._logout = () => { isAdmin = false; renderTopBar(); render(); toast('Saiu do modo admin.'); };

  window._openAdd = () => {
    editingId = null;
    document.getElementById('giftModalTitle').textContent = 'Adicionar Presente';
    document.getElementById('giftName').value = '';
    document.getElementById('giftDesc').value = '';
    document.getElementById('giftQty').value = 1;
    document.getElementById('giftImgFile').value = '';
    document.getElementById('imgPreview').style.display = 'none';
    showOverlay('giftModal');
  };
  window._edit = (id) => {
    const g = gifts.find(x => x.id === id); if (!g) return;
    editingId = id;
    document.getElementById('giftModalTitle').textContent = 'Editar Presente';
    document.getElementById('giftName').value = g.name;
    document.getElementById('giftDesc').value = g.desc;
    document.getElementById('giftQty').value = g.qty;
    document.getElementById('giftImgFile').value = '';
    const prev = document.getElementById('imgPreview');
    if (g.img) { prev.src = g.img; prev.style.display = 'block'; } else { prev.style.display = 'none'; }
    showOverlay('giftModal');
  };
  window.previewImgFile = () => {
    const file = document.getElementById('giftImgFile').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('imgPreview');
      prev.src = e.target.result;
      prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  };
  function getImgData() {
    return new Promise((resolve) => {
      const file = document.getElementById('giftImgFile').files[0];
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }
  window.saveGift = async () => {
    const name = document.getElementById('giftName').value.trim();
    const desc = document.getElementById('giftDesc').value.trim();
    const qty = parseInt(document.getElementById('giftQty').value) || 1;
    if (!name) { toast('Digite o nome do presente.'); return; }
    const newImg = await getImgData();
    if (editingId) {
      const g = gifts.find(x => x.id === editingId);
      const img = newImg || g.img || '';
      await updateDoc(doc(db, 'gifts', editingId), { name, desc, qty, img });
      toast('Presente atualizado! ✏️');
    } else {
      const img = newImg || '';
      await addDoc(giftsCol, { name, desc, qty, img, reservations: [], order: gifts.length });
      toast('Presente adicionado! 🎁');
    }
    closeOverlay('giftModal');
  };
  window._delete = async (id) => {
    if (!confirm('Excluir este presente?')) return;
    await deleteDoc(doc(db, 'gifts', id));
    toast('Presente removido.');
  };

  window._reserve = (id) => {
    reservingId = id;
    const g = gifts.find(x => x.id === id);
    document.getElementById('reserveGiftName').textContent = g.name + ' — ' + g.desc;
    document.getElementById('reserveName').value = '';
    document.getElementById('reserveQty').value = 1;
    document.getElementById('reserveQty').max = available(g);
    showOverlay('reserveModal');
  };
  window.confirmReserve = async () => {
    const name = document.getElementById('reserveName').value.trim();
    const qty = parseInt(document.getElementById('reserveQty').value) || 1;
    if (!name) { toast('Digite seu nome para reservar.'); return; }
    const g = gifts.find(x => x.id === reservingId); if (!g) return;
    if (qty > available(g)) { toast('Quantidade maior que o disponível.'); return; }
    const newRes = [...(g.reservations || []), { name, qty }];
    await updateDoc(doc(db, 'gifts', reservingId), { reservations: newRes });
    closeOverlay('reserveModal');
    toast(`Reservado com sucesso, ${name}! 💙`);
  };

  window._cancel = (id) => { cancelingId = id; document.getElementById('cancelName').value = ''; showOverlay('cancelModal'); };
  window.confirmCancel = async () => {
    const name = document.getElementById('cancelName').value.trim().toLowerCase();
    if (!name) { toast('Digite seu nome.'); return; }
    const g = gifts.find(x => x.id === cancelingId); if (!g) return;
    const idx = (g.reservations || []).findIndex(r => r.name.toLowerCase() === name);
    if (idx === -1) { toast('Nome não encontrado nas reservas.'); return; }
    const newRes = [...(g.reservations || [])];
    newRes.splice(idx, 1);
    await updateDoc(doc(db, 'gifts', cancelingId), { reservations: newRes });
    closeOverlay('cancelModal');
    toast('Reserva cancelada.');
  };
  window._removeRes = async (giftId, idx) => {
    const g = gifts.find(x => x.id === giftId); if (!g) return;
    const newRes = [...(g.reservations || [])];
    newRes.splice(idx, 1);
    await updateDoc(doc(db, 'gifts', giftId), { reservations: newRes });
    toast('Reserva removida.');
  };

  function showOverlay(id) { document.getElementById(id).classList.add('show'); }
  function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }
  window.closeOverlay = closeOverlay;
  document.querySelectorAll('.overlay').forEach(el => { el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); }); });

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  renderTopBar();
</script>
</body>
</html>
